<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein JobSearch Dashboard</title>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="bg-white shadow border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-xl font-bold text-gray-900">💼 JobSearch Dashboard</h1>
                <p class="text-xs text-gray-500 mt-0.5">Vollautomatisch gesammelte Stellenangebote</p>
            </div>
            <div class="w-full sm:w-80">
                <input type="text" id="searchInput" placeholder="Jobtitel oder Firma durchsuchen..." class="w-full px-4 py-2 text-sm border border-gray-300 rounded-lg">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="mb-4">
            <span id="jobCounter" class="font-medium bg-blue-50 text-blue-700 px-3 py-1 rounded-full">Lade Jobs...</span>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-left text-sm text-gray-500">
                    <thead class="bg-gray-50 text-xs uppercase text-gray-700 font-semibold border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3.5 w-1/2">Jobtitel</th>
                            <th class="px-6 py-3.5 w-1/3">Unternehmen</th>
                            <th class="px-6 py-3.5 text-right">Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody" class="divide-y divide-gray-200 bg-white">
                        <!-- Zeilen werden generiert -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const RAW_JSON_URL = "https://vercel.app";

        async function fetchJobs() {
            const tbody = document.getElementById("jobTableBody");
            try {
                const response = await fetch(RAW_JSON_URL);
                
                if (!response.ok) {
                    // Wenn die API antwortet, aber einen Fehlercode (wie 500) schickt
                    const errorText = await response.text();
                    throw new Error(`API-Server meldet Status ${response.status}: ${errorText}`);
                }
                
                const rawData = await response.json();
                const allJobs = rawData.map(item => item.data || item).filter(job => job.title);

                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-green-600 font-bold">Erfolg! ${allJobs.length} Jobs geladen. Technische Details passen.</td></tr>`;
            } catch (error) {
                // Gibt den exakten Grund aus (z.B. ob ein CORS-Netzwerkfehler vorliegt)
                console.error(error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="px-6 py-8 bg-red-50 text-red-700 p-4 font-mono text-xs">
                            <p class="font-bold text-sm mb-2">🔴 GENAUER FEHLER DIAGNOSTIZIERT:</p>
                            <p>${error.message}</p>
                            <p class="mt-2 text-gray-500">Falls hier 'Failed to fetch' steht, blockiert der Browser die Verbindung (CORS) oder die API stürzt ab.</p>
                        </td>
                    </tr>`;
            }
        }
        fetchJobs();
    </script>
</body>
</html>
