<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein JobSearch Dashboard</title>
    <!-- Das originale Design von gestern Nachmittag -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">💼 JobSearch Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Vollautomatisch gesammelte Stellenangebote</p>
            </div>
            <div class="w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Jobtitel oder Firma suchen..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
    </header>

    <!-- Hauptinhalt -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="statusContainer" class="mb-6 flex justify-between items-center text-sm text-gray-600">
            <span id="jobCounter" class="font-medium bg-blue-50 text-blue-700 px-3 py-1 rounded-full">Lade Jobs...</span>
        </div>

        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Karten -->
        </div>
    </main>

    <script>
        const RAW_JSON_URL = "https://vercel.app";
        let allJobs = [];

        async function fetchJobs() {
            const grid = document.getElementById("jobGrid");
            const counter = document.getElementById("jobCounter");

            try {
                const response = await fetch(RAW_JSON_URL);
                const rawData = await response.json();
                
                // DAS SCHUTZSCHILD: Entschlüsselt die Daten, falls Make sie als Text geschickt hat
                allJobs = rawData.map(item => {
                    let job = item.data || item;
                    if (typeof job === 'string') {
                        try {
                            job = JSON.parse(job);
                        } catch (e) {
                            return null;
                        }
                    }
                    return job;
                }).filter(job => job && job.title);

                counter.textContent = `${allJobs.length} Jobs gefunden`;
                renderJobs(allJobs);
            } catch (error) {
                console.error("Fehler beim Laden:", error);
                grid.innerHTML = `<div class="col-span-full bg-red-50 text-red-700 px-4 py-3 rounded-lg text-center font-medium">Fehler beim Laden der Jobdaten. Bitte überprüfen Sie die Verbindung.</div>`;
                counter.textContent = "0 Jobs";
            }
        }

        // Originale Karten-Generierung von gestern Nachmittag
        function renderJobs(jobsToRender) {
            const grid = document.getElementById("jobGrid");
            grid.innerHTML = "";

            if (jobsToRender.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-12">Keine passenden Jobs gefunden.</div>`;
                return;
            }

            jobsToRender.forEach(job => {
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md flex flex-col justify-between";
                
                const titleText = job.title ? String(job.title).replace(/<\/?[^>]+(>|$)/g, "") : "Kein Titel";
                const companyText = job.company ? String(job.company).replace(/<\/?[^>]+(>|$)/g, "") : "Unbekanntes Unternehmen";

                card.innerHTML = `
                    <div>
                        <h3 class="font-bold text-gray-900 text-lg leading-tight">${titleText}</h3>
                        <p class="text-sm font-medium text-gray-600 mt-2">🏢 ${companyText}</p>
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-100">
                        <a href="${job.link}" target="_blank" class="w-full block text-center bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm shadow-sm">Job ansehen ↗</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById("searchInput").addEventListener("input", (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allJobs.filter(job => {
                const titleMatch = job.title?.toLowerCase().includes(searchTerm);
                const companyMatch = job.company?.toLowerCase().includes(searchTerm);
                return titleMatch || companyMatch;
            });
            renderJobs(filtered);
            document.getElementById("jobCounter").textContent = `${filtered.length} von ${allJobs.length} Jobs angezeigt`;
        });

        fetchJobs();
    </script>
</body>
</html>
