<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein JobSearch Dashboard</title>
    <!-- Wir nutzen die stabile CSS-Version, die das Laden von JavaScript NIEMALS blockiert -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-6">

    <!-- Header & Filter-Leiste -->
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6">
        <h1 class="text-2xl font-bold text-gray-900">💼 JobSearch Dashboard</h1>
        <p class="text-sm text-gray-500 mt-1 mb-4">Vollautomatisch gesammelte Stellenangebote</p>
        
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-between pt-4 border-t border-gray-100">
            <input type="text" id="searchInput" placeholder="Jobtitel oder Firma suchen..." 
                   class="w-full sm:w-80 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <label class="flex items-center gap-2 text-sm bg-gray-100 px-4 py-2 rounded-lg cursor-pointer hover:bg-gray-200">
                <input type="checkbox" id="managementFilter" class="rounded text-blue-600">
                <span class="ml-2 font-medium">Praktika / Assistenzen ausblenden</span>
            </label>
        </div>
    </div>

    <!-- Hauptinhalt: Die saubere Tabelle -->
    <div class="max-w-6xl mx-auto bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center text-sm font-medium">
            <span id="jobCounter" class="text-blue-700">Lade Jobs...</span>
        </div>
        
        <table class="w-full text-left text-sm">
            <thead class="bg-gray-100 text-xs uppercase text-gray-700 font-bold border-b border-gray-200">
                <tr>
                    <th class="px-6 py-3 w-1/2">Jobtitel</th>
                    <th class="px-6 py-3 w-1/3">Unternehmen</th>
                    <th class="px-6 py-3 text-right">Aktion</th>
                </tr>
            </thead>
            <tbody id="jobTableBody" class="divide-y divide-gray-200">
                <!-- Die Jobs werden hier sicher eingefügt -->
            </tbody>
        </table>
    </div>

    <script>
        // DEIN FUNKTIONIERENDER, PRIVATER API-TUNNEL VON VORHIN!
        const RAW_JSON_URL = "https://vercel.app";
        let allJobs = [];
        
        // Wörter, die wir herausfiltern oder markieren wollen
        const filterWords = ["praktikum", "praktikant", "internship", "intern", "trainee", "assistenz", "assistent", "praktika"];

        async function fetchJobs() {
            try {
                const response = await fetch(RAW_JSON_URL);
                const rawData = await response.json();
                
                // Extrahiert die Daten sicher aus der privaten Datei
                allJobs = rawData.map(item => item.data || item).filter(job => job.title);
                filterAndRender();
            } catch (error) {
                document.getElementById("jobTableBody").innerHTML = `<tr><td colspan="3" class="p-6 text-center text-red-500 font-bold">Verbindung zum privaten API-Server wird aufgebaut... Bitte lade die Seite in wenigen Sekunden neu.</td></tr>`;
            }
        }

        function filterAndRender() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const hideInternships = document.getElementById("managementFilter").checked;

            const filtered = allJobs.filter(job => {
                const title = job.title?.toLowerCase() || "";
                const company = job.company?.toLowerCase() || "";
                
                const matchesSearch = title.includes(search) || company.includes(search);
                const isInternship = filterWords.some(word => title.includes(word));
                
                if (hideInternships && isInternship) return false;
                return matchesSearch;
            });

            const tbody = document.getElementById("jobTableBody");
            tbody.innerHTML = "";

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-6 text-center text-gray-400">Keine Jobs gefunden.</td></tr>`;
                return;
            }

            filtered.forEach(job => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-gray-50 border-b border-gray-100";
                
                // Bereinigung von HTML-Resten aus Jobportalen
                const cleanTitle = job.title.replace(/<\/?[^>]+(>|$)/g, "");
                const cleanCompany = job.company ? job.company.replace(/<\/?[^>]+(>|$)/g, "") : "Nicht angegeben";
                const isInternship = filterWords.some(word => cleanTitle.toLowerCase().includes(word));

                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <span class="${isInternship ? 'text-gray-400 italic line-through' : 'font-semibold text-gray-900'}">${cleanTitle}</span>
                        ${isInternship ? '<span class="ml-2 text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">Keine Leitung</span>' : ''}
                    </td>
                    <td class="px-6 py-4 text-gray-600 font-medium">🏢 ${cleanCompany}</td>
                    <td class="px-6 py-4 text-right">
                        <a href="${job.link}" target="_blank" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium py-1.5 px-3 rounded text-xs shadow-sm transition-colors">Öffnen ↗</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById("jobCounter").textContent = `${filtered.length} von ${allJobs.length} Jobs angezeigt`;
        }

        document.getElementById("searchInput").addEventListener("input", filterAndRender);
        document.getElementById("managementFilter").addEventListener("change", filterAndRender);
        fetchJobs();
    </script>
</body>
</html>
